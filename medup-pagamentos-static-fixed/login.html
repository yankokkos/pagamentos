<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedUp Pagamentos - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body {
            background: linear-gradient(135deg, #021015 0%, #042938 50%, #021015 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: linear-gradient(135deg, rgba(2, 16, 21, 0.95) 0%, rgba(4, 41, 56, 0.9) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(150, 212, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section img {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .logo-section h1 {
            color: #96d4ff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: rgba(150, 212, 255, 0.7);
            font-size: 1rem;
        }

        .form-label {
            color: #96d4ff;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: rgba(2, 16, 21, 0.8);
            border: 1px solid rgba(150, 212, 255, 0.3);
            color: #96d4ff;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(2, 16, 21, 0.9);
            border-color: #96d4ff;
            box-shadow: 0 0 0 0.2rem rgba(150, 212, 255, 0.25);
            color: #96d4ff;
        }

        .form-control::placeholder {
            color: rgba(150, 212, 255, 0.5);
        }

        .btn-login {
            background: linear-gradient(135deg, #96d4ff 0%, #042938 100%);
            border: none;
            color: #021015;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #042938 0%, #96d4ff 100%);
            color: #96d4ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(150, 212, 255, 0.3);
        }

        .alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            border-radius: 10px;
        }

        .input-group-text {
            background: rgba(2, 16, 21, 0.8);
            border: 1px solid rgba(150, 212, 255, 0.3);
            color: #96d4ff;
            border-radius: 10px 0 0 10px;
        }

        .input-group .form-control {
            border-radius: 0 10px 10px 0;
            border-left: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: #96d4ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="/favicon.svg" alt="MedUp Logo">
                <h1>MedUp</h1>
                <p>Sistema de Pagamentos</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-2"></i>Usuário
                    </label>
                    <input type="text" class="form-control" id="username" placeholder="Digite seu usuário" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-2"></i>Senha
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" class="form-control" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                    </div>
                </div>

                <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span id="errorText">Usuário ou senha incorretos!</span>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            // Credenciais corretas
            if (username === 'Tiago' && password === 'medup1302@') {
                // Salvar sessão
                sessionStorage.setItem('medup_logged_in', 'true');
                sessionStorage.setItem('medup_user', username);
                
                // Redirecionar para a aplicação principal
                window.location.href = '/';
            } else {
                // Mostrar erro
                errorText.textContent = 'Usuário ou senha incorretos!';
                errorDiv.classList.remove('d-none');
                
                // Limpar campos
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('username').focus();
            }
        });

        // Focar no campo usuário ao carregar
        document.getElementById('username').focus();
    </script>
</body>
</html>
